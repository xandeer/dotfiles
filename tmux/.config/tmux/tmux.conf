# Load the shared tmux configuration in a fixed order.
source-file ~/.config/tmux/conf.d/00-options.conf
source-file ~/.config/tmux/conf.d/10-keybindings.conf
source-file ~/.config/tmux/conf.d/20-windows.conf
source-file ~/.config/tmux/conf.d/30-copy-mode.conf
source-file ~/.config/tmux/conf.d/40-status.conf
source-file ~/.config/tmux/conf.d/50-plugins.conf

if-shell '[ -f ~/.config/tmux/conf.d/90-local.conf ]' \
  'source-file ~/.config/tmux/conf.d/90-local.conf'
