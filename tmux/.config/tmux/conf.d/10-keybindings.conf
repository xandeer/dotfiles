# Reload configuration without restarting tmux.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Create windows and panes in the current working directory.
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Use vim-like pane navigation after the prefix.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes in larger steps.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation and housekeeping.
bind -r n next-window
bind -r p previous-window
bind Tab last-window
bind , command-prompt -I "#{window_name}" "rename-window -- '%%'"
bind S setw synchronize-panes
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind X confirm-before -p "kill-window #W? (y/n)" kill-window
