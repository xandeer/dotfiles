# Keep the status line informative without relying on a theme plugin.
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-keys vi

set -g status-style fg=colour240,bg=colour255
set -g status-left-length 24
set -g status-right-length 80

set -g status-left '#[fg=colour16,bg=colour39,bold] #S #[default]'
set -g window-status-format '#[fg=colour240] #I:#W '
set -g window-status-current-format '#[fg=colour16,bg=colour220,bold] #I:#W #[default]'
set -g status-right '#{?client_prefix,#[fg=colour16,bg=colour220,bold] PREFIX #[default] ,}#[fg=colour240]#H %Y-%m-%d %H:%M '
